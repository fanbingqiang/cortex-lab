<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex - 多智能体协作框架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }
        
        .logo span {
            color: #6366f1;
        }
        
        .header-subtitle {
            color: #999;
            font-size: 0.85rem;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-id-input {
            padding: 8px 12px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 150px;
        }
        
        .user-id-input:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            color: #666;
            font-size: 1.2rem;
        }
        
        .settings-btn:hover {
            background: #f0f0f0;
        }
        
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            background: white;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
            padding: 40px;
        }
        
        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        
        .welcome-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        
        .welcome-desc {
            font-size: 1rem;
            color: #999;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .example-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 600px;
        }
        
        .example-prompt {
            background: #f8f8f8;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            max-width: 280px;
            text-align: left;
        }
        
        .example-prompt:hover {
            background: #f0f0ff;
            border-color: #6366f1;
            color: #333;
        }
        
        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .message-avatar.user {
            background: #6366f1;
            color: white;
        }
        
        .message-avatar.assistant {
            background: #f0f0f0;
        }
        
        .message-name {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        .message-time {
            font-size: 0.75rem;
            color: #999;
        }
        
        .message-content {
            padding-left: 40px;
            line-height: 1.7;
            color: #333;
        }
        
        .message-content pre {
            background: #f8f8f8;
            padding: 12px 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 0.85rem;
        }
        
        .message-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        
        .task-graph-container {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
        }
        
        .task-graph-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        
        .task-node-item {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .task-node-item.success {
            border-left: 3px solid #22c55e;
        }
        
        .task-node-item.running {
            border-left: 3px solid #3b82f6;
        }
        
        .task-node-item.failed {
            border-left: 3px solid #ef4444;
        }
        
        .task-node-item.pending {
            border-left: 3px solid #d1d5db;
        }
        
        .task-node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .task-node-name {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }
        
        .task-node-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .status-success {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status-running {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .status-pending {
            background: #f3f4f6;
            color: #6b7280;
        }
        
        .status-failed {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .task-node-agent {
            font-size: 0.8rem;
            color: #999;
        }
        
        .input-container {
            padding: 16px 24px 24px;
            border-top: 1px solid #e5e5e5;
            background: white;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .input-box {
            flex: 1;
            background: #f8f8f8;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: border-color 0.2s;
        }
        
        .input-box:focus-within {
            border-color: #6366f1;
            background: white;
        }
        
        .input-box textarea {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            font-size: 1rem;
            line-height: 1.5;
            max-height: 150px;
            outline: none;
            font-family: inherit;
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #6366f1;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            background: #4f46e5;
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        
        .sidebar {
            width: 320px;
            background: white;
            border-left: 1px solid #e5e5e5;
            display: none;
            flex-direction: column;
        }
        
        .sidebar.open {
            display: flex;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e5e5;
            font-weight: 600;
            color: #333;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .profile-section {
            margin-bottom: 20px;
        }
        
        .profile-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }
        
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            background: #f0f0ff;
            color: #6366f1;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        
        .tag.warning {
            background: #fff3e0;
            color: #e65100;
        }
        
        .add-tag-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .add-tag-input input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .add-tag-input button {
            padding: 6px 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .agent-list {
            margin-top: 16px;
        }
        
        .agent-item {
            background: #f8f8f8;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .agent-name {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .agent-desc {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.4;
        }
        
        .agent-caps {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .cap-tag {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        .clear-btn {
            width: 100%;
            padding: 10px;
            background: #f8f8f8;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
            margin-top: 16px;
        }
        
        .clear-btn:hover {
            background: #fee2e2;
            border-color: #ef4444;
            color: #dc2626;
        }
        
        @media (max-width: 768px) {
            .header-subtitle {
                display: none;
            }
            
            .example-prompts {
                flex-direction: column;
                align-items: center;
            }
            
            .example-prompt {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo"><span>🧠</span> Cortex</div>
            <div class="header-subtitle">多智能体协作框架</div>
        </div>
        <div class="header-right">
            <input type="text" class="user-id-input" id="userId" value="default-user" placeholder="用户ID">
            <button class="settings-btn" onclick="toggleSidebar()">⚙️</button>
        </div>
    </div>
    
    <div class="main-container">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">🧠</div>
                    <div class="welcome-title">欢迎使用 Cortex</div>
                    <div class="welcome-desc">
                        我是一个多智能体协作框架，可以帮你分析代码、设计技术方案、搜索信息等。
                        输入你的需求，我会自动拆解任务并分配给合适的Agent执行。
                    </div>
                    <div class="example-prompts">
                        <div class="example-prompt" onclick="useExample('分析这段代码的潜在问题并给出优化建议：\\n\\n```java\\npublic List<User> getUsers() {\\n    List<User> users = new ArrayList<>();\\n    for (int i = 0; i < 100; i++) {\\n        users.add(new User(i, \"user\" + i));\\n    }\\n    return users;\\n}\\n```')">
                            💻 分析代码问题
                        </div>
                        <div class="example-prompt" onclick="useExample('设计一个用户认证系统的技术方案，包括登录、注册、密码找回等功能')">
                            📐 设计技术方案
                        </div>
                        <div class="example-prompt" onclick="useExample('调研Spring Boot 3.0的新特性，整理成报告')">
                            🔍 调研技术特性
                        </div>
                        <div class="example-prompt" onclick="useExample('帮我写一个多线程任务执行的示例代码，要求支持任务依赖和并行执行')">
                            📝 生成示例代码
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea id="userInput" placeholder="输入你的需求..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">用户画像 & Agent</div>
            <div class="sidebar-content">
                <div class="profile-section">
                    <div class="profile-title">性格特点</div>
                    <div class="tag-container" id="personalityTags"></div>
                    <div class="add-tag-input">
                        <input type="text" id="newPersonality" placeholder="添加特点...">
                        <button onclick="addPersonality()">+</button>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="profile-title">工作习惯</div>
                    <div class="tag-container" id="workHabits"></div>
                    <div class="add-tag-input">
                        <input type="text" id="newHabit" placeholder="添加习惯...">
                        <button onclick="addHabit()">+</button>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="profile-title">踩坑记录</div>
                    <div class="tag-container" id="mistakes"></div>
                </div>
                
                <div class="agent-list">
                    <div class="profile-title">可用Agent</div>
                    <div id="agentList"></div>
                </div>
                
                <button class="clear-btn" onclick="clearChat()">清空对话</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        let isLoading = false;
        
        const userInput = document.getElementById('userInput');
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function useExample(text) {
            document.getElementById('userInput').value = text;
            document.getElementById('userInput').focus();
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) {
                loadProfile();
                loadAgents();
            }
        }
        
        function addMessage(role, content, isHtml = false) {
            document.getElementById('welcomeScreen').style.display = 'none';
            
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const avatar = role === 'user' ? '👤' : '🤖';
            const name = role === 'user' ? '你' : 'Cortex';
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar ${role}">${avatar}</div>
                    <span class="message-name">${name}</span>
                    <span class="message-time">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="message-content">${isHtml ? content : escapeHtml(content)}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }
        
        function addTypingIndicator() {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.id = 'typingIndicator';
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar assistant">🤖</div>
                    <span class="message-name">Cortex</span>
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatResult(data) {
            let html = '<div class="task-graph-container">';
            html += '<div class="task-graph-title">📋 任务执行过程</div>';
            
            for (const node of data.graph.nodes) {
                const statusClass = node.status.toLowerCase();
                const statusText = {
                    'SUCCESS': '✓ 完成',
                    'RUNNING': '⏳ 执行中',
                    'PENDING': '○ 等待',
                    'FAILED': '✗ 失败'
                }[node.status] || node.status;
                
                html += `
                    <div class="task-node-item ${statusClass}">
                        <div class="task-node-header">
                            <span class="task-node-name">${escapeHtml(node.title)}</span>
                            <span class="task-node-status status-${statusClass}">${statusText}</span>
                        </div>
                        <div class="task-node-agent">Agent: ${node.agentId}</div>
                    </div>
                `;
            }
            
            html += '</div>';
            html += '<div style="margin-top: 16px; white-space: pre-wrap;">' + escapeHtml(data.result) + '</div>';
            
            return html;
        }
        
        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const userId = document.getElementById('userId').value;
            
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            addTypingIndicator();
            
            try {
                const response = await fetch(`${API_BASE}/task/run`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, requirement: message })
                });
                
                const data = await response.json();
                
                removeTypingIndicator();
                
                if (data.code === 200) {
                    addMessage('assistant', formatResult(data.data), true);
                } else {
                    addMessage('assistant', '❌ 执行失败: ' + data.message);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '❌ 请求失败: ' + error.message);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }
        
        async function loadProfile() {
            const userId = document.getElementById('userId').value;
            
            try {
                const response = await fetch(`${API_BASE}/profile/${userId}`);
                const data = await response.json();
                
                if (data.code === 200) {
                    const profile = data.data;
                    
                    const personalityHtml = (profile.personalityTags || [])
                        .map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
                    document.getElementById('personalityTags').innerHTML = personalityHtml || '<span style="color: #999; font-size: 0.8rem;">暂无</span>';
                    
                    const habitsHtml = (profile.workHabits || [])
                        .map(h => `<span class="tag">${escapeHtml(h)}</span>`).join('');
                    document.getElementById('workHabits').innerHTML = habitsHtml || '<span style="color: #999; font-size: 0.8rem;">暂无</span>';
                    
                    const mistakesHtml = (profile.mistakes || [])
                        .map(m => `<span class="tag warning" title="${escapeHtml(m.description)}">${escapeHtml(m.keyword)}</span>`).join('');
                    document.getElementById('mistakes').innerHTML = mistakesHtml || '<span style="color: #999; font-size: 0.8rem;">暂无</span>';
                }
            } catch (error) {
                console.error('加载画像失败:', error);
            }
        }
        
        async function addPersonality() {
            const userId = document.getElementById('userId').value;
            const input = document.getElementById('newPersonality');
            const tag = input.value.trim();
            
            if (!tag) return;
            
            try {
                await fetch(`${API_BASE}/profile/${userId}/tags`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tag })
                });
                
                input.value = '';
                loadProfile();
            } catch (error) {
                alert('添加失败');
            }
        }
        
        async function addHabit() {
            const userId = document.getElementById('userId').value;
            const input = document.getElementById('newHabit');
            const habit = input.value.trim();
            
            if (!habit) return;
            
            try {
                await fetch(`${API_BASE}/profile/${userId}/habits`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ habit })
                });
                
                input.value = '';
                loadProfile();
            } catch (error) {
                alert('添加失败');
            }
        }
        
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE}/agents`);
                const data = await response.json();
                
                if (data.code === 200) {
                    const html = data.data.map(agent => {
                        const caps = JSON.parse(agent.capabilities || '[]');
                        return `
                            <div class="agent-item">
                                <div class="agent-name">${escapeHtml(agent.name)}</div>
                                <div class="agent-desc">${escapeHtml(agent.description)}</div>
                                <div class="agent-caps">
                                    ${caps.map(c => `<span class="cap-tag">${escapeHtml(c)}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    document.getElementById('agentList').innerHTML = html;
                }
            } catch (error) {
                console.error('加载Agent失败:', error);
            }
        }
        
        function clearChat() {
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatMessages').appendChild(document.getElementById('welcomeScreen'));
        }
    </script>
</body>
</html>
